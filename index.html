<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <title>まにまにクエスト - フィールド探索版</title>
  <style>
    :root{--bg1:#0f172a;--bg2:#1e293b;--panel:rgba(15,23,42,.86);--line:rgba(255,255,255,.12);--text:#f8fafc;--muted:#cbd5e1}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,rgba(56,189,248,.22),transparent 32%),radial-gradient(circle at 90% 20%,rgba(167,139,250,.18),transparent 28%),linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;overscroll-behavior:none}
    body{min-height:100dvh;display:grid;place-items:center;padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left))}
    .game{width:min(100%,620px);background:var(--panel);border:1px solid var(--line);border-radius:26px;box-shadow:0 28px 90px rgba(0,0,0,.42);overflow:hidden;backdrop-filter:blur(16px)}
    .header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px 10px}
    h1{margin:0;font-size:clamp(23px,6vw,34px);letter-spacing:.03em}
    .meta{text-align:right;font-size:12px;color:var(--muted);line-height:1.5}
    .battlefield{position:relative;min-height:360px;overflow:hidden;background:linear-gradient(to bottom,rgba(125,211,252,.12),rgba(15,23,42,.02) 52%,rgba(34,197,94,.12) 53%,rgba(21,128,61,.2)),repeating-linear-gradient(90deg,transparent 0 49px,rgba(255,255,255,.015) 50px);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .moon{position:absolute;width:78px;height:78px;border-radius:50%;right:30px;top:24px;background:radial-gradient(circle at 35% 35%,#fff,#fde68a 55%,#f59e0b);box-shadow:0 0 40px rgba(253,230,138,.35);opacity:.9}
    .ground{position:absolute;left:-10%;right:-10%;bottom:-42px;height:150px;border-radius:50%;background:radial-gradient(ellipse at center,#166534,#14532d 70%);box-shadow:inset 0 16px 40px rgba(255,255,255,.04)}
    .character{position:absolute;bottom:85px;display:flex;flex-direction:column;align-items:center;transition:transform .18s ease,filter .18s ease,opacity .25s ease;user-select:none}
    .hero{left:9%}.enemy{right:10%}.sprite{font-size:clamp(72px,19vw,112px);line-height:1;filter:drop-shadow(0 14px 12px rgba(0,0,0,.38))}.hero .sprite{transform:scaleX(-1)}.portrait-sprite{width:clamp(96px,24vw,138px);height:clamp(96px,24vw,138px);font-size:0;transform:none !important;border-radius:50%;overflow:hidden;border:4px solid rgba(255,255,255,.95);background:rgba(255,255,255,.16);box-shadow:0 14px 22px rgba(0,0,0,.35),0 0 0 6px rgba(255,255,255,.08)}.portrait-sprite img{width:100%;height:100%;object-fit:cover;display:block;object-position:center 18%}.enemy-portrait{position:relative;transform:none !important}.enemy-portrait .enemy-face{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center center;display:none}.enemy-portrait .enemy-face.active{display:block}
    .nameplate{margin-top:8px;padding:5px 10px;border-radius:999px;background:rgba(15,23,42,.75);border:1px solid var(--line);font-weight:800;font-size:13px}
    .shake{animation:shake .32s ease}.lunge{animation:lunge .32s ease}.cast{animation:cast .45s ease}.defeated{opacity:.25;transform:translateY(20px) rotate(8deg)}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}50%{transform:translateX(10px)}75%{transform:translateX(-6px)}}
    @keyframes lunge{0%,100%{transform:translateX(0)}45%{transform:translateX(38px) scale(1.05)}}
    @keyframes cast{0%,100%{filter:drop-shadow(0 14px 12px rgba(0,0,0,.38))}50%{filter:drop-shadow(0 0 25px #a78bfa) brightness(1.45);transform:translateY(-8px)}}
    .effect{position:absolute;pointer-events:none;font-weight:900;font-size:32px;text-shadow:0 3px 10px rgba(0,0,0,.55);animation:floatUp .85s ease forwards;z-index:5}
    .effect.critical{font-size:38px;text-shadow:0 0 12px rgba(250,204,21,.8),0 3px 10px rgba(0,0,0,.65)}
    @keyframes floatUp{0%{opacity:0;transform:translateY(8px) scale(.8)}15%{opacity:1}100%{opacity:0;transform:translateY(-55px) scale(1.16)}}
    .status-grid{position:absolute;left:14px;right:14px;top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:3}
    .card{background:rgba(15,23,42,.82);border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
    .card-title{display:flex;justify-content:space-between;gap:8px;font-weight:900;font-size:13px;margin-bottom:7px}

    .hero-rank{margin:-2px 0 7px;color:#fde68a;font-size:12px;font-weight:900;letter-spacing:.03em}
    .stat-line{margin-bottom:6px;color:#c4b5fd;font-size:11px;font-weight:800;letter-spacing:.02em}
    .bar-row{display:grid;grid-template-columns:30px 1fr 54px;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:5px}
    .bar{height:10px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.08)}.fill{height:100%;width:100%;border-radius:inherit;transition:width .35s ease}
    .hp{background:linear-gradient(90deg,#16a34a,#4ade80)}.enemy-hp{background:linear-gradient(90deg,#dc2626,#fb7185)}.mp{background:linear-gradient(90deg,#0284c7,#38bdf8)}.exp{background:linear-gradient(90deg,#7c3aed,#c084fc)}
    .number{text-align:right;font-variant-numeric:tabular-nums}.lower{padding:14px}
    .message{min-height:70px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid var(--line);line-height:1.55;display:flex;align-items:center;color:#e2e8f0;font-weight:700}
    .commands{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
    .cmd{min-height:58px;border:1px solid rgba(255,255,255,.14);border-radius:16px;color:white;background:rgba(255,255,255,.08);font-size:16px;font-weight:900;cursor:pointer;touch-action:manipulation;transition:transform .08s ease,filter .15s ease,opacity .2s ease}
    .cmd small{display:block;font-size:11px;font-weight:600;margin-top:3px;color:rgba(255,255,255,.75)}.cmd:active{transform:scale(.97)}.cmd:disabled{opacity:.38;cursor:default}
    .attack{background:linear-gradient(135deg,#b45309,#f59e0b)}.skill{background:linear-gradient(135deg,#6d28d9,#a78bfa)}.heal{background:linear-gradient(135deg,#047857,#10b981)}.guard{background:linear-gradient(135deg,#334155,#64748b)}.map,.magic,.job,.shop,.audio{grid-column:1/-1}.audio{background:linear-gradient(135deg,#be185d,#f59e0b)}.audio.audio-on{box-shadow:0 0 0 2px rgba(250,204,21,.28),0 0 18px rgba(245,158,11,.24)}.magic{background:linear-gradient(135deg,#7c3aed,#06b6d4)}.job{background:linear-gradient(135deg,#92400e,#ef4444)}.shop{background:linear-gradient(135deg,#0f766e,#ca8a04)}.spell{background:linear-gradient(135deg,#312e81,#0f766e)}.job-choice{background:linear-gradient(135deg,#422006,#7f1d1d)}.shop-choice{background:linear-gradient(135deg,#164e63,#854d0e)}.magic-panel,.job-panel,.shop-panel{grid-column:1/-1;display:none;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid var(--line)}.magic-panel.open,.job-panel.open,.shop-panel.open{display:grid}.magic-panel .cmd,.job-panel .cmd,.shop-panel .cmd{min-height:50px;font-size:14px}.spell-locked,.job-locked,.shop-locked{opacity:.34}.spell-ready,.job-current,.equip-current{box-shadow:0 0 0 2px rgba(250,204,21,.24)}.shop-buyable{box-shadow:0 0 0 2px rgba(52,211,153,.22)}
    .map{background:linear-gradient(135deg,#1d4ed8,#16a34a)}.map-panel{display:none;margin-top:12px;padding:12px;border-radius:20px;background:rgba(255,255,255,.055);border:1px solid var(--line)}.map-panel.open{display:block}.map-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:#e2e8f0;font-weight:900}.map-help{color:var(--muted);font-size:11px;line-height:1.45}.field-screen{position:relative;height:min(58vw,300px);min-height:230px;overflow:hidden;margin:10px 0;border:1px solid rgba(255,255,255,.14);border-radius:22px;background:linear-gradient(to bottom,#60a5fa 0 38%,#22c55e 39% 100%);box-shadow:inset 0 0 42px rgba(0,0,0,.25)}.field-screen:before{content:"";position:absolute;left:-10%;right:-10%;bottom:-20%;height:46%;border-radius:50%;background:radial-gradient(ellipse at center,rgba(21,128,61,.9),rgba(20,83,45,.95));box-shadow:inset 0 18px 35px rgba(255,255,255,.06)}.field-screen:after{content:"";position:absolute;left:43%;bottom:-7%;width:16%;height:66%;background:linear-gradient(to bottom,rgba(180,83,9,.55),rgba(120,53,15,.76));clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);opacity:.7}.field-forest{background:linear-gradient(to bottom,#0f766e 0 36%,#14532d 37% 100%)}.field-water{background:linear-gradient(to bottom,#38bdf8 0 44%,#0369a1 45% 100%)}.field-treasure{background:linear-gradient(to bottom,#f59e0b 0 35%,#166534 36% 100%)}.field-camp{background:linear-gradient(to bottom,#475569 0 34%,#15803d 35% 100%)}.field-boss{background:linear-gradient(to bottom,#111827 0 45%,#7f1d1d 46% 100%)}.field-start{background:linear-gradient(to bottom,#60a5fa 0 38%,#16a34a 39% 100%)}.field-hero{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);width:58px;height:58px;display:grid;place-items:center;border-radius:50%;background:rgba(250,204,21,.92);box-shadow:0 0 20px rgba(250,204,21,.55),0 14px 20px rgba(0,0,0,.3);font-size:32px;z-index:4;transition:left .22s ease,top .22s ease}.field-current{position:absolute;right:12px;top:12px;z-index:3;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(15,23,42,.58);padding:6px 10px;font-size:12px;font-weight:900}.field-marker{position:absolute;z-index:2;font-size:28px;filter:drop-shadow(0 6px 8px rgba(0,0,0,.35))}.field-marker.village{left:12%;top:43%}.field-marker.ruin{left:72%;top:36%}.field-marker.castle{right:10%;top:18%;font-size:36px}.field-marker.camp{left:18%;bottom:15%}.field-marker.treasure{right:20%;bottom:18%}.encounter-gauge{position:absolute;left:12px;right:12px;bottom:10px;z-index:5;display:grid;grid-template-columns:72px 1fr;align-items:center;gap:8px;padding:7px 9px;border-radius:999px;background:rgba(15,23,42,.68);border:1px solid rgba(255,255,255,.12);font-size:10px;font-weight:900;color:#cbd5e1}.encounter-gauge i{height:8px;border-radius:999px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);transform-origin:left center;transform:scaleX(.2);transition:transform .25s ease}.joystick-wrap{display:grid;gap:10px;justify-items:center}.joy-pad{display:grid;grid-template-columns:64px 64px 64px;grid-template-rows:54px 54px 54px;gap:7px;justify-content:center;align-items:center;padding:10px;border-radius:24px;background:rgba(15,23,42,.45);border:1px solid rgba(255,255,255,.1);touch-action:manipulation}.joy-btn{width:64px;height:54px;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:linear-gradient(135deg,#334155,#0f766e);color:#fff;font-size:24px;font-weight:900;box-shadow:0 8px 16px rgba(0,0,0,.18);cursor:pointer}.joy-btn:active{transform:scale(.95);filter:brightness(1.15)}.joy-center{display:grid;place-items:center;width:64px;height:54px;border-radius:18px;background:rgba(255,255,255,.08);font-size:24px}.auto-map-btn{width:100%;min-height:54px;border:1px solid rgba(255,255,255,.16);border-radius:16px;background:linear-gradient(135deg,#15803d,#2563eb);color:#fff;font-size:16px;font-weight:900;cursor:pointer;touch-action:manipulation}.auto-map-btn.objective{background:linear-gradient(135deg,#7c2d12,#be123c)}.auto-map-btn small{display:block;font-size:11px;font-weight:700;margin-top:3px;color:rgba(255,255,255,.78)}.auto-map-btn:active{transform:scale(.98)}.auto-map-btn:disabled{opacity:.42}.map-idle{opacity:.32;filter:grayscale(.4)}
        .story{grid-column:1/-1;background:linear-gradient(135deg,#4338ca,#be123c)}.story-panel{display:none;margin-top:12px;padding:12px;border-radius:18px;background:linear-gradient(160deg,rgba(49,46,129,.28),rgba(88,28,135,.18));border:1px solid rgba(216,180,254,.28)}.story-panel.open{display:block}.story-head,.map-head{display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:900;color:#fde68a;margin-bottom:8px}.story-box,.quest-box{border:1px solid rgba(255,255,255,.12);background:rgba(15,23,42,.55);border-radius:14px;padding:10px;margin-top:8px;line-height:1.55;font-size:13px}.chapter-title{font-size:15px;font-weight:900;color:#fff;margin-bottom:4px}.quest-line{color:#bfdbfe;font-weight:800}.story-note{color:#d8b4fe}.system-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.system-tags span{border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.08);font-size:11px;font-weight:800}.ending-glow{animation:endingGlow 1.2s ease infinite alternate}@keyframes endingGlow{from{filter:drop-shadow(0 0 6px rgba(250,204,21,.35))}to{filter:drop-shadow(0 0 20px rgba(250,204,21,.95))}}
.footer-row{margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;color:var(--muted);font-size:12px}.restart{border:1px solid var(--line);border-radius:12px;padding:9px 12px;color:white;background:rgba(255,255,255,.08);font-weight:800}
    @media(max-width:430px){.header{padding:13px 14px 8px}.battlefield{min-height:335px}.status-grid{top:10px;left:10px;right:10px;gap:7px}.card{padding:8px}.bar-row{grid-template-columns:28px 1fr 46px;gap:4px}.hero{left:5%}.enemy{right:5%}.sprite{font-size:76px}.portrait-sprite{width:92px;height:92px}.lower{padding:11px}.message{min-height:62px;font-size:14px}.commands{gap:8px}.cmd{min-height:54px;font-size:15px}}
    @media(max-height:720px){.battlefield{min-height:300px}.character{bottom:68px}.sprite{font-size:70px}.portrait-sprite{width:78px;height:78px}.message{min-height:54px}.cmd{min-height:49px}}
  </style>
</head>
<body>

  async function playerAction(type,spellId=null){

    if(type==='attack'){animateClass(heroEl,'lunge');await sleep(210);const critical=Math.random()<critRate();const atk=effectiveAttack();const base=rand(atk+5,atk+13+hero.level);const dmg=Math.round(base*(critical?critMultiplier():1));enemy.hp-=dmg;animateClass(enemyEl,'shake');floatEffect(enemyEl,`${critical?'💥 会心 ':'-'}${dmg}`,'#fde68a',critical?'critical':'');setMessage(critical?`<strong>会心の一撃！</strong> あなたの攻撃が急所に入った！ <strong>${dmg}ダメージ</strong>！`:`あなたの攻撃！ <strong>${dmg}ダメージ</strong>！`)}
    if(type==='skill'){const cost=skillCost();hero.mp-=cost;animateClass(heroEl,'cast',500);await sleep(300);const critical=Math.random()<skillCritRate();const mag=effectiveMagic();const base=hero.level>=5?rand(mag+38,mag+58+hero.level*3):hero.level>=3?rand(mag+28,mag+44+hero.level*2):rand(mag+18,mag+30+hero.level*2);const dmg=Math.round(base*(critical?critMultiplier():1));enemy.hp-=dmg;animateClass(enemyEl,'shake');floatEffect(enemyEl,`${critical?'💥🔥 ':'🔥 -'}${dmg}`,'#fb7185',critical?'critical':'');setMessage(`${skillName()}！ <strong>${dmg}ダメージ</strong>${critical?'！ <strong>会心の一撃！</strong>':'！'}`)}
    if(type==='heal'){hero.potions--;const amount=rand(28,42),healed=Math.min(amount,hero.maxHp-hero.hp);hero.hp+=healed;animateClass(heroEl,'cast',450);floatEffect(heroEl,`+${healed}`,'#86efac');setMessage(`回復薬を使った。HPが<strong>${healed}</strong>回復！`)}
    if(type==='guard'){hero.guarding=true;animateClass(heroEl,'cast',400);setMessage(currentJob().guard<.5?`守り人の構え！ 次のダメージを大きく軽減します。`:`あなたは盾を構えた。次のダメージを半減します。`)}
    if(type==='magic'){
      const sp=spells[spellId],cost=spellCost(spellId);hero.mp-=cost;animateClass(heroEl,'cast',560);await sleep(330);
      if(spellId==='heal'){
        const mag=effectiveMagic();const amount=rand(mag+28,mag+46+hero.level*3),healed=Math.min(amount,hero.maxHp-hero.hp);hero.hp+=healed;floatEffect(heroEl,`${sp.icon} +${healed}`,'#86efac');setMessage(`${sp.name}！ HPが<strong>${healed}</strong>回復した。`);
      }else{
        const critical=Math.random()<magicCritRate();
        const mag=effectiveMagic();const base=spellId==='fire'?rand(mag+16,mag+30+hero.level*2):spellId==='thunder'?rand(mag+28,mag+48+hero.level*3):rand(mag+58,mag+88+hero.level*4);
        const dmg=Math.round(base*(critical?critMultiplier():1));enemy.hp-=dmg;animateClass(enemyEl,'shake');floatEffect(enemyEl,`${critical?'💥':' '}${sp.icon} -${dmg}`,'#c4b5fd',critical?'critical':'');
        if(spellId==='thunder'&&Math.random()<.38){enemy.stunned=true;setMessage(`${sp.name}！ <strong>${dmg}ダメージ</strong>${critical?'！ <strong>魔法会心！</strong>':''}！ ${enemy.name}はしびれている！`)}
        else setMessage(`${sp.name}！ <strong>${dmg}ダメージ</strong>${critical?'！ <strong>魔法会心！</strong>':'！'}`);
      }
    }
    render();await sleep(700);if(enemy.hp<=0){await victory();return}await enemyTurn();
  }
  async function enemyTurn(){
    if(enemy.stunned){enemy.stunned=false;animateClass(enemyEl,'shake');setMessage(`${enemy.name}はしびれて動けない！`);await sleep(750);locked=false;setMessage(`あなたの番です。コマンドを選んでください。`);render();return}
    const special=enemy.name==='魔王まにまに'&&Math.random()<.3;animateClass(enemyEl,special?'cast':'lunge',special?500:350);setMessage(special?`${enemy.name}は炎を吐いた！`:`${enemy.name}の攻撃！`);await sleep(special?450:260);
    let dmg=special?rand(enemy.attack[1],enemy.attack[1]+10):rand(enemy.attack[0],enemy.attack[1]);if(hero.guarding){dmg=Math.ceil(dmg*currentJob().guard);hero.guarding=false}dmg=Math.max(1,dmg-effectiveDefense());
    hero.hp-=dmg;animateClass(heroEl,'shake');floatEffect(heroEl,`-${dmg}`,'#fca5a5');setMessage(`${enemy.name}の攻撃！ あなたは<strong>${dmg}ダメージ</strong>受けた。`);render();await sleep(750);
    if(hero.hp<=0){defeat();return}locked=false;setMessage(`あなたの番です。コマンドを選んでください。`);render();
  }
  async function victory(){
    const defeatedName=enemy.name;
    enemy.hp=0;enemyEl.classList.add('defeated');const gainedExp=enemy.exp+Math.max(0,stage-enemies.length+1)*12,gainedGold=Math.round((enemy.gold+Math.max(0,stage-enemies.length+1)*10)*currentJob().gold);hero.exp+=gainedExp;hero.totalExp+=gainedExp;hero.gold+=gainedGold;
    setMessage(`${enemy.name}を倒した！ <strong>${gainedExp}EXP</strong> と <strong>${gainedGold}G</strong> を獲得！`);render();await sleep(1050);
    const levelLogs=applyLevelUp();
    if(levelLogs.length){floatEffect(heroEl,'LEVEL UP!','#facc15');animateClass(heroEl,'cast',600);setMessage(`<strong>レベルアップ！</strong><br>${levelLogs.join('<br>')}<br>HPとMPが全回復した！`);render();await sleep(1700)}
    if(defeatedName==='魔王まにまに')hero.story.cleared=true;
    stage++;
    const storyLogs=advanceStory();
    if(storyLogs.length){storyPanel.classList.add('open');setMessage(`<strong>物語が進行しました！</strong><br>${storyLogs.join('<br>')}`);render();await sleep(1900)}
    if(defeatedName==='魔王まにまに'){endingSequence();locked=false;render();return}
    enterMapMode('勝利！MAP探索に戻りました。物語統括で次の目的を確認しましょう。');locked=false;render();
  }
  function defeat(){hero.hp=0;heroEl.classList.add('defeated');gameOver=true;locked=true;mapMode=false;stopBgm();updateBgmText();setMessage(`<strong>あなたは倒れてしまった……</strong><br>「最初から」で再挑戦できます。`);render()}
  mapBtn.addEventListener('click',()=>{if(!mapMode)enterMapMode();else toggleMapPanel()});storyBtn.addEventListener('click',toggleStoryPanel);if(autoExploreBtn)autoExploreBtn.addEventListener('click',()=>autoMapAction('auto'));if(objectiveBtn)objectiveBtn.addEventListener('click',()=>autoMapAction('objective'));moveBtns.forEach(btn=>btn.addEventListener('click',()=>{const [dx,dy]=btn.dataset.move.split(',').map(Number);movePlayer(dx,dy)}));attackBtn.addEventListener('click',()=>playerAction('attack'));skillBtn.addEventListener('click',()=>playerAction('skill'));healBtn.addEventListener('click',()=>playerAction('heal'));guardBtn.addEventListener('click',()=>playerAction('guard'));magicBtn.addEventListener('click',toggleMagicPanel);spellBtns.forEach(btn=>btn.addEventListener('click',()=>playerAction('magic',btn.dataset.spell)));jobBtn.addEventListener('click',toggleJobPanel);jobBtns.forEach(btn=>btn.addEventListener('click',()=>switchJob(btn.dataset.job)));shopBtn.addEventListener('click',toggleShopPanel);shopBtns.forEach(btn=>btn.addEventListener('click',()=>{const [type,id]=btn.dataset.shop.split(':');buyOrEquipEquipment(type,id)}));bgmBtn.addEventListener('click',toggleBgm);restartBtn.addEventListener('click',resetGame);window.__showEnemyForCheck=(index)=>{stage=Math.max(0,Math.min(index,enemies.length-1));nextEnemy(index===0);locked=false;render();};window.__levelUpForCheck=()=>{hero.exp=hero.expNext;const logs=applyLevelUp();setMessage(`<strong>レベルアップテスト</strong><br>${logs.join('<br>')}`);render();};window.__changeJobForCheck=(id)=>switchJob(id);window.__moveForCheck=(dx,dy)=>movePlayer(dx,dy);window.__enterMapForCheck=()=>enterMapMode();window.__storyForCheck=()=>{storyPanel.classList.add('open');renderStoryPanel();return hero.story};resetGame();
})();
</script>
